<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🌸👽</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ecefec;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.2s ease-in-out, visibility 1.2s;
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .lyrics-overlay {
            position: relative;
            z-index: 2;
            text-align: center;
            pointer-events: none;
            padding: 20px;
        }

        .line {
            font-size: 24px;
            font-weight: bold;
            margin: 15px 0;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            text-shadow: 0 0 10px rgba(255, 71, 126, 0.6), 0 0 20px rgba(255, 71, 126, 0.4);
        }

        .line.active {
            opacity: 1;
            transform: translateY(0);
        }

        .neon-center-set {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
            user-select: none;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        .neon-text {
            color: #ffccff;
            font-size: 26pt;
            text-align: center;
            margin-bottom: 15px;
            font-family: 'Press Start 2P', monospace;
            text-shadow: 0 0 5px #ffccff, 0 0 15px #ff3399, 0 0 30px #ff3399;
        }

        .neon-heart-svg {
            width: 140px;
            height: 140px;
            filter: drop-shadow(0 0 4px #ffccff) drop-shadow(0 0 10px #ff3399) drop-shadow(0 0 25px #ff3399);
        }

        .matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            overflow: hidden;
            z-index: 15;
            opacity: 0;
            transition: opacity 1s ease;
            background-color: #000;
            font-family: 'Press Start 2P', monospace;
        }

        .matrix-column {
            display: flex;
            flex-direction: column;
            white-space: nowrap;
            font-size: 11px;
            line-height: 1.8;
            color: rgba(255, 51, 153, 0.55);
            user-select: none;
        }

        .matrix-move {
            animation: scrollDown 10s linear infinite;
        }

        .matrix-column:nth-child(even) .matrix-move {
            animation: scrollDown 7s linear infinite;
        }

        @keyframes scrollDown {
            0% {
                transform: translateY(-50%);
            }

            100% {
                transform: translateY(0%);
            }
        }

        #main-card {
            background: linear-gradient(135deg, #160410 0%, #000000 100%);
            overflow-y: auto;
            padding: 40px 20px;
            justify-content: flex-start;
            z-index: 30;
        }

        .card-content {
            max-width: 500px;
            width: 100%;
            text-align: center;
            margin: auto;
            animation: fadeIn 1.5s ease-in-out;
        }

        .heart-icon {
            font-size: 55px;
            animation: pulse 1.5s infinite;
            text-shadow: 0 0 15px #ff477e;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            color: #ff758f;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 117, 143, 0.5);
        }

        .main-p {
            font-size: 18px;
            line-height: 1.6;
            color: #d8b4f8;
            margin-bottom: 35px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .grid-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 71, 126, 0.2);
            border-radius: 12px;
            padding: 15px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .grid-item:hover {
            transform: translateY(-5px);
            border-color: #ff477e;
        }

        .grid-item h3 {
            font-size: 16px;
            color: #ff758f;
            margin-bottom: 5px;
        }

        .grid-item span {
            font-size: 13px;
            color: #ecefec;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cursor-particle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            user-select: none;
            animation: cursorFade 1s ease-out forwards;
            will-change: transform, opacity;
        }

        @keyframes cursorFade {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy) - 60px)) scale(0.2) rotate(var(--rot));
            }
        }

        .confetti-particle {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            border-radius: 50%;
            animation: confettiFall var(--dur) ease-in forwards;
            will-change: transform, opacity;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0.4);
            }
        }
    </style>
</head>

<body>

    <div id="scene-intro" class="screen">
        <div id="canvas-container">
            <canvas id="sakuraCanvas"></canvas>
        </div>
        <div class="lyrics-overlay">
            <div class="line" id="line1">Я люблю тебя</div>
            <div class="line" id="line2">Как сакуру японки &lt;3</div>
            <div class="line" id="line3">Я дальше не помню что там</div>
        </div>
    </div>

    <div class="matrix-bg" id="bgContainer" style="display: none;"></div>
    <div class="neon-center-set" id="neonSet" style="display: none; opacity: 0;">
        <div class="neon-text">LOVE YOU</div>
        <svg class="neon-heart-svg" viewBox="0 0 24 24" fill="#ffccff">
            <path
                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
        </svg>
    </div>

    <div id="main-card" class="screen hidden">
        <div class="card-content">
            <div class="heart-icon">🌸</div>
            <h1>Text</h1>
            <p class="main-p">Text</p>

            <div class="grid">
                <div class="grid-item">
                    <h3>Text</h3>
                    <span>Text</span>
                </div>
                <div class="grid-item">
                    <h3>Text</h3>
                    <span>Text</span>
                </div>
                <div class="grid-item">
                    <h3>Text</h3>
                    <span>Text</span>
                </div>
                <div class="grid-item">
                    <h3>Text</h3>
                    <span>Text</span>
                </div>
            </div>
            <p style="font-size: 12px; color: #555; font-family: monospace;">Для фанатки 67</p>
        </div>
    </div>

    <script>
        const t1 = 1500;
        const t2 = 3500;
        const t3 = 6500;
        const tToMatrix = 11000;
        const tToFinal = 16000;

        setTimeout(() => document.getElementById('line1').classList.add('active'), t1);
        setTimeout(() => {
            document.getElementById('line2').classList.add('active');
            startTreeGrowth();
        }, t2);
        setTimeout(() => document.getElementById('line3').classList.add('active'), t3);

        setTimeout(() => {
            document.getElementById('scene-intro').classList.add('hidden');

            buildMatrixBackground();
            const bgContainer = document.getElementById('bgContainer');
            const neonSet = document.getElementById('neonSet');

            bgContainer.style.display = 'flex';
            neonSet.style.display = 'flex';

            setTimeout(() => {
                bgContainer.style.opacity = '1';
                neonSet.style.opacity = '1';
            }, 50);
        }, tToMatrix);

        setTimeout(() => {
            const bgContainer = document.getElementById('bgContainer');
            const neonSet = document.getElementById('neonSet');

            bgContainer.style.opacity = '0';
            neonSet.style.opacity = '0';

            setTimeout(() => {
                bgContainer.style.display = 'none';
                neonSet.style.display = 'none';
                document.getElementById('main-card').classList.remove('hidden');
                triggerConfetti();
            }, 1000);
        }, tToFinal);

        const trailSymbols = ['❤️', '🌸', '💕', '✨', '🌸', '❤️', '💗'];
        let lastTrailTime = 0;

        document.addEventListener('mousemove', (e) => {
            const now = Date.now();
            if (now - lastTrailTime < 60) return;
            lastTrailTime = now;

            const el = document.createElement('div');
            el.className = 'cursor-particle';
            el.textContent = trailSymbols[Math.floor(Math.random() * trailSymbols.length)];

            const size = (Math.random() * 14 + 12).toFixed(0);
            const dx = (Math.random() * 40 - 20).toFixed(0);
            const dy = (Math.random() * 20 - 10).toFixed(0);
            const rot = (Math.random() * 360).toFixed(0);

            el.style.cssText = `
                left: ${e.clientX}px;
                top: ${e.clientY}px;
                font-size: ${size}px;
                --dx: ${dx}px;
                --dy: ${dy}px;
                --rot: ${rot}deg;
            `;

            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        });

        function triggerConfetti() {
            const colors = ['#ff477e', '#ffccff', '#d8b4f8', '#ff758f', '#fff', '#ff3399'];
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const count = 80;

            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'confetti-particle';

                const angle = Math.random() * 360;
                const dist = Math.random() * 300 + 80;
                const tx = Math.cos(angle * Math.PI / 180) * dist;
                const ty = Math.sin(angle * Math.PI / 180) * dist;
                const size = Math.random() * 10 + 5;
                const dur = (Math.random() * 1.2 + 0.8).toFixed(2);
                const rot = (Math.random() * 720).toFixed(0);
                const color = colors[Math.floor(Math.random() * colors.length)];

                el.style.cssText = `
                    left: ${cx}px;
                    top: ${cy}px;
                    width: ${size}px;
                    height: ${size}px;
                    background: ${color};
                    --tx: ${tx}px;
                    --ty: ${ty}px;
                    --rot: ${rot}deg;
                    --dur: ${dur}s;
                    box-shadow: 0 0 6px ${color};
                `;

                document.body.appendChild(el);
                setTimeout(() => el.remove(), parseFloat(dur) * 1000 + 100);
            }
        }

        function buildMatrixBackground() {
            const bgContainer = document.getElementById('bgContainer');
            bgContainer.innerHTML = '';

            const charWidth = 95;
            const columnCount = Math.ceil(window.innerWidth / charWidth) + 1;

            let textBlock = "";
            for (let i = 0; i < 60; i++) {
                textBlock += "LOVE YOU<br>";
            }

            for (let i = 0; i < columnCount; i++) {
                const col = document.createElement('div');
                col.className = 'matrix-column';

                const moveDiv = document.createElement('div');
                moveDiv.className = 'matrix-move';
                moveDiv.innerHTML = textBlock + textBlock;

                col.style.opacity = (Math.random() * 0.4 + 0.3).toFixed(2);
                moveDiv.style.animationDelay = (Math.random() * -10) + 's';

                col.appendChild(moveDiv);
                bgContainer.appendChild(col);
            }
        }
        window.addEventListener('resize', buildMatrixBackground);

        const canvas = document.getElementById('sakuraCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let branches = [];
        let flowers = [];
        let treeReady = false;
        let growthStart = null;
        const GROW_DURATION = 3500;

        function generateTree(x1, y1, angle, length, width, depth) {
            if (depth === 0 || length < 4) return;

            const rad = angle * Math.PI / 180;
            const x2 = x1 + Math.cos(rad) * length;
            const y2 = y1 + Math.sin(rad) * length;

            branches.push({ x1, y1, x2, y2, width, depth, progress: 0 });

            if (depth <= 3) {
                const numFlowers = Math.floor(Math.random() * 4) + 2;
                for (let i = 0; i < numFlowers; i++) {
                    flowers.push({
                        x: x2 + (Math.random() * 50 - 25),
                        y: y2 + (Math.random() * 50 - 25),
                        size: Math.random() * 6 + 4,
                        alpha: 0,
                        delay: GROW_DURATION * 0.6 + Math.random() * 800,
                        depth
                    });
                }
            }

            const branches_count = depth > 5 ? 2 : (Math.random() > 0.3 ? 2 : 3);
            for (let i = 0; i < branches_count; i++) {
                const spread = depth > 5 ? 28 : 22;
                let off;
                if (branches_count === 2) {
                    off = i === 0 ? -(Math.random() * spread + 12) : (Math.random() * spread + 12);
                } else {
                    off = [-spread, 0, spread][i] + (Math.random() * 8 - 4);
                }
                generateTree(x2, y2, angle + off, length * (0.68 + Math.random() * 0.08), width * 0.62, depth - 1);
            }
        }

        function drawPetal(cx, cy, size, rotation, alpha) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(rotation);
            ctx.globalAlpha = alpha;

            const gradient = ctx.createRadialGradient(0, -size * 0.3, 0, 0, 0, size);
            gradient.addColorStop(0, 'rgba(255, 200, 220, 1)');
            gradient.addColorStop(0.5, 'rgba(255, 130, 170, 0.9)');
            gradient.addColorStop(1, 'rgba(220, 60, 120, 0.3)');

            ctx.shadowBlur = 12;
            ctx.shadowColor = 'rgba(255, 80, 140, 0.7)';

            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(
                size * 0.6, -size * 0.2,
                size * 0.7, -size * 1.0,
                0, -size * 1.2
            );
            ctx.bezierCurveTo(
                -size * 0.7, -size * 1.0,
                -size * 0.6, -size * 0.2,
                0, 0
            );
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.restore();
        }

        function drawSakuraFlower(cx, cy, size, alpha) {
            const petals = 5;
            for (let i = 0; i < petals; i++) {
                drawPetal(cx, cy, size, (i / petals) * Math.PI * 2, alpha);
            }
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffe0f0';
            ctx.beginPath();
            ctx.arc(cx, cy, size * 0.25, 0, Math.PI * 2);
            const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.25);
            cg.addColorStop(0, '#fff8ff');
            cg.addColorStop(1, '#ffaacc');
            ctx.fillStyle = cg;
            ctx.fill();
            ctx.restore();
        }

        function drawBranch(b) {
            const px = b.x1 + (b.x2 - b.x1) * b.progress;
            const py = b.y1 + (b.y2 - b.y1) * b.progress;

            ctx.save();
            ctx.shadowBlur = b.width > 3 ? 8 : 3;
            ctx.shadowColor = 'rgba(180, 80, 120, 0.4)';
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const grad = ctx.createLinearGradient(b.x1, b.y1, b.x2, b.y2);
            grad.addColorStop(0, `rgba(60, 25, 40, ${Math.min(0.9, b.width * 0.12 + 0.4)})`);
            grad.addColorStop(1, `rgba(120, 50, 80, ${Math.min(0.7, b.width * 0.08 + 0.2)})`);

            ctx.strokeStyle = grad;
            ctx.lineWidth = Math.max(0.8, b.width);
            ctx.beginPath();
            ctx.moveTo(b.x1, b.y1);
            ctx.lineTo(px, py);
            ctx.stroke();
            ctx.restore();
        }

        let sakuraAnimId = null;

        function animateSakura(ts) {
            if (!growthStart) growthStart = ts;
            const elapsed = ts - growthStart;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const baseGrad = ctx.createRadialGradient(
                canvas.width / 2, canvas.height, 0,
                canvas.width / 2, canvas.height, canvas.height * 0.4
            );
            baseGrad.addColorStop(0, 'rgba(80, 10, 40, 0.18)');
            baseGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = baseGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let b of branches) {
                const branchDelay = (10 - b.depth) * (GROW_DURATION / 13);
                const branchDur = GROW_DURATION * 0.35;
                const t = Math.max(0, Math.min(1, (elapsed - branchDelay) / branchDur));
                b.progress = easeOut(t);
                if (b.progress > 0) drawBranch(b);
            }

            for (let f of flowers) {
                const ft = Math.max(0, Math.min(1, (elapsed - f.delay) / 600));
                f.alpha = easeOut(ft) * (0.75 + f.depth * 0.05);
                if (f.alpha > 0) drawSakuraFlower(f.x, f.y, f.size, f.alpha);
            }

            const allDone = elapsed > GROW_DURATION + 900;
            if (!allDone) {
                sakuraAnimId = requestAnimationFrame(animateSakura);
            } else {
                treeReady = true;
                startFallingLeaves();
            }
        }

        function easeOut(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function startTreeGrowth() {
            branches = [];
            flowers = [];
            treeReady = false;
            growthStart = null;
            const baseLen = Math.min(canvas.height * 0.22, 200);
            generateTree(canvas.width / 2, canvas.height + 10, -90, baseLen, 14, 9);
            branches.sort((a, b) => b.depth - a.depth);
            sakuraAnimId = requestAnimationFrame(animateSakura);
        }

        let leaves = [];
        let leavesAnimId = null;

        function startFallingLeaves() {
            for (let i = 0; i < 40; i++) {
                leaves.push(createLeaf(true));
            }
            leavesAnimId = requestAnimationFrame(updateLeaves);
        }

        function createLeaf(randomY) {
            return {
                x: Math.random() * canvas.width,
                y: randomY ? Math.random() * canvas.height : -20,
                speed: Math.random() * 1.2 + 0.4,
                size: Math.random() * 5 + 3,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.04,
                swing: Math.random() * Math.PI * 2,
                swingSpeed: Math.random() * 0.025 + 0.01,
                alpha: Math.random() * 0.4 + 0.5
            };
        }

        function drawLeaf(leaf) {
            ctx.save();
            ctx.translate(leaf.x, leaf.y);
            ctx.rotate(leaf.rotation);
            ctx.globalAlpha = leaf.alpha;

            const s = leaf.size;
            const grad = ctx.createRadialGradient(0, -s * 0.3, 0, 0, 0, s);
            grad.addColorStop(0, 'rgba(255, 210, 225, 0.95)');
            grad.addColorStop(0.6, 'rgba(255, 130, 170, 0.8)');
            grad.addColorStop(1, 'rgba(210, 50, 110, 0.1)');

            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(255,100,150,0.6)';

            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(s * 0.6, -s * 0.2, s * 0.7, -s, 0, -s * 1.2);
            ctx.bezierCurveTo(-s * 0.7, -s, -s * 0.6, -s * 0.2, 0, 0);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.restore();
        }

        function renderTreeStill() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const baseGrad = ctx.createRadialGradient(
                canvas.width / 2, canvas.height, 0,
                canvas.width / 2, canvas.height, canvas.height * 0.4
            );
            baseGrad.addColorStop(0, 'rgba(80, 10, 40, 0.18)');
            baseGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = baseGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let b of branches) { b.progress = 1; drawBranch(b); }
            for (let f of flowers) drawSakuraFlower(f.x, f.y, f.size, f.alpha);
        }

        function updateLeaves() {
            if (document.getElementById('scene-intro').classList.contains('hidden')) return;

            renderTreeStill();

            for (let leaf of leaves) {
                leaf.swing += leaf.swingSpeed;
                leaf.x += Math.sin(leaf.swing) * 0.8;
                leaf.y += leaf.speed;
                leaf.rotation += leaf.rotSpeed;
                drawLeaf(leaf);
                if (leaf.y > canvas.height + 20) {
                    Object.assign(leaf, createLeaf(false));
                }
            }
            leavesAnimId = requestAnimationFrame(updateLeaves);
        }
    </script>
</body>

</html>
